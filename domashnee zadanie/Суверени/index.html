<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/style.css">
    <title>Totobi - Сувениры и товары</title>
</head>
<body>
    <header class="header">
        <div class="header__logo">
            <img src="src/images/logo.png" alt="Totobi" class="header__image-logo">
            <span class="header__name-site">Totobi</span>
        </div>
        <div class="header__cities">
            <span class="header__city-name">Челябинск</span>
            <span class="header__icon-open">▼</span>
        </div>
        <div class="header__search">
            <input type="search" class="header__search-input"
            placeholder="Поиск">
            <div class="header__category">
                <span class="header__category-name">Каталог</span>
                <span class="header__category-icon-open">▼</span>
            </div>
            <div class="header__search-icon">
                <img src="src/images/search.svg" alt="Поиск" 
                class="header__search-image">
            </div>
            <div class="header__contacts">
                <img src="src/images/watsapp.png" alt="whatsapp" class="header__contacts-whatsapp">
                <img src="src/images/Viber.png" alt="viber" class="header__contacts-viber">
                <span class="header__contacts-phone">+7 (000) 000-00-10</span>
                <div class="header__contacts-text">
                    <span class="header__contacts-dot"></span>
                    <span class="header__contacts-signture">Звоните, мы работаем</span>
                </div>
            </div>
            <button class="button">Заказать звонок</button>
        </div>
    </header>
</body>
</html>
