<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер HTML/CSS</title>   
    <style>
        .grid {
            display: grid;
            grid-template-columns:1fr 1fr 1fr 1fr 1fr;
            
            width: 100%;
            height: 1000px;
        }
        
        .img1 {
            
            border: 2px solid #000;
            background: url('nigastrong.jpg');
            background-position: center;
            background-size: cover;
            filter: blur(3px);
        }
        .img2 {
            grid-column-start: 2;
            grid-column-end: 4;
            border: 2px solid #000;
            background: url('дцп.jpg');
            background-position: center;
            background-size: cover;
            filter: brightness(200%) saturate(2020%) invert(100);
            mix-blend-mode: multiply;border-radius:  50%;
        }
        .img3 {
       
            border: 2px solid #000;
            background: url('Кукукареку.jpg');
            background-position: center;
            background-size: cover;
            filter: contrast(50%);
        }
        .img4 {
        
            border: 2px solid #000;
            background: url('Пердак.jpg');
            background-position: center;
            background-size: cover;
            filter: invert(100%);
        }
    
        .img5 {
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 2;
            grid-row-end: 4;
            border: 2px solid #000;
            background: linear-gradient(45deg, rgba(0, 0, 0, 0.8), rgba(207, 207, 207, 0.8)), url('стендов.jpg');
            background-position: center;
            background-size: cover;
            border-radius:  50%;
            filter: grayscale(15)  ;
            box-shadow: 5px 3px 4px 2px black;
        }
        .img6 {
            
            border: 2px solid #000;
            background: url('дутый1.jpg');
            background-position: center;
            background-size: cover;
            filter :saturate(387);
        }
    .img7 {
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 4;
            grid-column-end: 5;
            border: 2px solid #000;
            background: linear-gradient(45deg, rgba(255, 0, 0, 0.632), rgba(0, 0, 255, 0.747)), url('дутый2.jpg');
            background-position: center;
            background-size: cover;
            border-top-left-radius:  50%;
            border-top-right-radius: 50%;
            border-bottom-left-radius: 50% ;
             border-bottom-right-radius: 50% ;
            filter: drop-shadow(15px 15px  rgb(0, 0, 0)) ;
            mix-blend-mode: overlay;
        }
        .img8 {
            
            border: 2px solid #000;
            background: url('яказах.jpg');
            background-position: center;
            background-size: cover;
            filter: hue-rotate(180deg)	;
        }
        .img9 {
            
            border: 2px solid #000;
            background: url('яказах.jpg');
            background-position: center;
            background-size: cover;
            filter: brightness(999%);
        }
        .img10 {
            
            border: 2px solid #000;
            background: url('кахахалк.jpg');
            background-position: center;
            background-size: cover;
            filter :saturate(150); 
        }
        

    </style>     
</head>
<body>
    <div class="grid">
        <div class="img1">
        </div>
        <div class="img2">
            
        </div>
        <div class="img3">
           
        </div>
        <div class="img4">
           
        </div>
        <div class="img5">
           
        </div>
        <div class="img6"></div>
            <div class="img7"></div>
            <div class="img8"></div>
            <div class="img9"></div>
            <div class="img10"></div>
        


    </div>

</body>
</html>
