<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер HTML/CSS</title>   
    <style>
        .grid {
            display: grid;
            grid-template-columns:1fr 1fr 1fr 1fr 1fr;
            
            width: 100%;
            height: 1000px;
        }
        
        .img1 {
            
            border: 2px solid #000;
            background: url('nigastrong.jpg');
            background-position: center;
            background-size: cover;
        }
        .img2 {
            grid-column-start: 2;
            grid-column-end: 4;
            border: 2px solid #000;
            background: url('дцп.jpg');
            background-position: center;
            background-size: cover;
        }
        .img3 {
       
            border: 2px solid #000;
            background: url('Кукукареку.jpg');
            background-position: center;
            background-size: cover;
        }
        .img4 {
        
            border: 2px solid #000;
            background: url('Пердак.jpg');
            background-position: center;
            background-size: cover;
        }
    
        .img5 {
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 2;
            grid-row-end: 4;
            border: 2px solid #000;
            background: url('стендов.jpg');
            background-position: center;
            background-size: cover;
        }
        .img6 {
            
            border: 2px solid #000;
            background: url('дутый1.jpg');
            background-position: center;
            background-size: cover;
        }
    .img7 {
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 4;
            grid-column-end: 5;
            border: 2px solid #000;
            background: url('дутый2.jpg');
            background-position: center;
            background-size: cover;
        }
        .img8 {
            
            border: 2px solid #000;
            background: url('мамбетjpg.jpg');
            background-position: center;
            background-size: cover;
        }
        .img9 {
            
            border: 2px solid #000;
            background: url('яказах.jpg');
            background-position: center;
            background-size: cover;
        }
        .img10 {
            
            border: 2px solid #000;
            background: url('кахахалк.jpg');
            background-position: center;
            background-size: cover;
        }

    </style>     
</head>
<body>
    <div class="grid">
        <div class="img1">
        </div>
        <div class="img2">
            
        </div>
        <div class="img3">
           
        </div>
        <div class="img4">
           
        </div>
        <div class="img5">
           
        </div>
        <div class="img6"></div>
            <div class="img7"></div>
            <div class="img8"></div>
            <div class="img9"></div>
            <div class="img10"></div>
        


    </div>

</body>
</html>
